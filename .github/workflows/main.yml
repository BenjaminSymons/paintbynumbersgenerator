name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build (web + CLI)
        run: npm run build

      - name: CLI smoke test
        run: |
          mkdir -p ci-out
          node dist/cli.js -i src-cli/testinput.png -o ci-out/out.svg -c src-cli/settings.json
          test -s ci-out/out-bordersLabels.svg
          test -s ci-out/out-full.png
          test -s ci-out/out-jpgtest.jpg
          test -s ci-out/out.json

      - name: Kit pipeline smoke test
        run: npm run test:kit

      - name: Upload CLI bundle
        if: matrix.node-version == '22.x'
        uses: actions/upload-artifact@v4
        with:
          name: pbn-cli
          path: |
            dist/cli.js
            dist/cli.js.map
